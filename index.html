<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSCA 保護者ページ</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#2c2c2a;min-height:100vh;}
.wrap{max-width:680px;margin:0 auto;padding:1rem 0.75rem 3rem;}
.hidden{display:none!important;}
.login-wrap{display:flex;flex-direction:column;align-items:center;padding-top:2rem;}
.login-card{width:100%;max-width:360px;background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:1.5rem;}
.logo-mark{text-align:center;margin-bottom:1.25rem;}
.logo-mark .lt{font-size:26px;font-weight:500;color:#1D9E75;letter-spacing:1px;}
.logo-mark p{font-size:12px;color:#888780;margin-top:2px;}
.field-wrap{margin-bottom:12px;}
.f-label{font-size:12px;color:#888780;margin-bottom:6px;display:block;}
input[type=text],input[type=password]{width:100%;padding:9px 10px;font-size:14px;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;background:#fff;color:#2c2c2a;outline:none;}
input:focus{border-color:#1D9E75;}
.cls-row{display:flex;gap:8px;margin-bottom:12px;}
.cls-option{flex:1;}
.cls-option input[type=radio]{position:absolute;opacity:0;width:0;height:0;}
.cls-label{display:block;text-align:center;padding:10px 0;font-size:13px;font-weight:500;border:2px solid #D3D1C7;border-radius:8px;background:#F1EFE8;color:#5F5E5A;cursor:pointer;transition:all .15s;user-select:none;}
.cls-option input[type=radio]:checked+.cls-label{border-color:#1D9E75!important;background:#1D9E75!important;color:#fff!important;}
.login-btn{width:100%;padding:11px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:4px;}
.login-btn:hover{background:#0F6E56;}
.login-err{font-size:12px;color:#A32D2D;margin-top:8px;text-align:center;}
.admin-link{text-align:center;margin-top:14px;font-size:12px;color:#888780;cursor:pointer;text-decoration:underline;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.site-name{font-size:16px;font-weight:500;}
.user-sub{font-size:12px;color:#888780;}
.logout-btn{font-size:12px;background:none;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:4px 10px;cursor:pointer;color:#888780;}
.tab-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:1.25rem;}
.tab-row{display:flex;gap:4px;min-width:max-content;padding-bottom:2px;}
.tab-btn{padding:6px 12px;font-size:13px;border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;background:#fff;color:#888780;cursor:pointer;white-space:nowrap;}
.tab-btn.active{background:#1D9E75;color:#fff;border-color:#1D9E75;font-weight:500;}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.step-header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:0.5px solid rgba(0,0,0,0.08);}
.step-num{width:22px;height:22px;border-radius:50%;background:#E1F5EE;color:#0F6E56;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;}
.step-title{font-size:14px;font-weight:500;}
.step-body{padding:14px 16px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.i-label{font-size:11px;color:#888780;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em;}
.i-val{font-size:14px;font-weight:500;}
.i-val.sm{font-size:13px;font-weight:400;line-height:1.5;}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;margin-right:4px;margin-bottom:4px;}
.tag-hop{background:#FBEAF0;color:#993356;}
.tag-soar{background:#E6F1FB;color:#0C447C;}
.tag-only{background:#FAEEDA;color:#412402;}
.checklist{list-style:none;}
.checklist li{display:flex;align-items:flex-start;gap:8px;font-size:13px;padding:5px 0;border-bottom:0.5px solid rgba(0,0,0,0.08);}
.checklist li:last-child{border-bottom:none;}
.chk{color:#1D9E75;font-size:14px;flex-shrink:0;}
.flow-steps{display:flex;flex-direction:column;}
.flow-item{display:flex;gap:12px;padding:6px 0;}
.fl{display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0;}
.fd{width:9px;height:9px;border-radius:50%;background:#1D9E75;margin-top:4px;}
.fli{width:1px;flex:1;background:rgba(0,0,0,0.1);min-height:14px;}
.flow-item:last-child .fli{display:none;}
.ftime{font-size:12px;color:#888780;font-weight:500;min-width:44px;margin-top:2px;}
.fdesc{font-size:13px;line-height:1.5;margin-top:2px;}

/* 出欠ブロック */
.child-att-block{border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;overflow:hidden;margin-bottom:10px;}
.child-att-block:last-child{margin-bottom:0;}
.child-att-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#f9f9f7;cursor:pointer;user-select:none;}
.child-att-header-left{display:flex;align-items:center;gap:8px;}
.child-badge{font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px;}
.badge-hop{background:#FBEAF0;color:#993356;}
.badge-soar{background:#E6F1FB;color:#0C447C;}
.badge-none{background:#F1EFE8;color:#5F5E5A;}
.child-att-name{font-size:13px;font-weight:500;}
.child-att-status{font-size:12px;color:#888780;}
.chevron{font-size:12px;color:#888780;transition:transform .2s;}
.chevron.open{transform:rotate(180deg);}
.child-att-body{padding:12px;border-top:0.5px solid rgba(0,0,0,0.08);}

/* クラス選択（HOP/SOAR）*/
.type-row{display:flex;gap:6px;margin-bottom:10px;}
.type-option{flex:1;}
.type-option input[type=radio]{position:absolute;opacity:0;width:0;height:0;}
.type-label{display:block;text-align:center;padding:8px 0;font-size:12px;font-weight:500;border:2px solid #D3D1C7;border-radius:8px;background:#F1EFE8;color:#5F5E5A;cursor:pointer;user-select:none;transition:all .15s;}
.type-option input[type=radio]:checked+.type-label.hop-type{background:#D4537E!important;border-color:#D4537E!important;color:#fff!important;}
.type-option input[type=radio]:checked+.type-label.soar-type{background:#185FA5!important;border-color:#185FA5!important;color:#fff!important;}

/* 出欠ラジオ */
.att-radio-group{display:flex;gap:6px;}
.att-option{flex:1;}
.att-option input[type=radio]{position:absolute;opacity:0;width:0;height:0;}
.att-option-label{display:block;text-align:center;padding:10px 0;font-size:13px;font-weight:500;border:2px solid #D3D1C7;border-radius:8px;background:#F1EFE8;color:#5F5E5A;cursor:pointer;user-select:none;transition:all .15s;}
.att-option input[type=radio]:checked+.att-option-label.yes-label{background:#1D9E75!important;border-color:#1D9E75!important;color:#fff!important;}
.att-option input[type=radio]:checked+.att-option-label.no-label{background:#E24B4A!important;border-color:#E24B4A!important;color:#fff!important;}
.att-option input[type=radio]:checked+.att-option-label.maybe-label{background:#BA7517!important;border-color:#BA7517!important;color:#fff!important;}
.reason-box{margin-top:8px;}
.reason-box textarea{width:100%;padding:7px 9px;font-size:12px;min-height:56px;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;background:#fff;color:#2c2c2a;resize:vertical;font-family:inherit;}
.sub-btn{width:100%;padding:10px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:10px;}
.sub-btn:hover{background:#0F6E56;}
.sub-btn:disabled{opacity:.4;cursor:not-allowed;}
.done-msg{background:#E1F5EE;border-radius:8px;padding:10px 12px;font-size:13px;color:#0F6E56;}
.done-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.change-link{font-size:12px;background:none;border:none;color:#888780;cursor:pointer;text-decoration:underline;white-space:nowrap;}
.saving-indicator{font-size:12px;color:#888780;text-align:center;margin-top:6px;min-height:18px;}
.spin{display:inline-block;width:10px;height:10px;border:1.5px solid #D3D1C7;border-top-color:#1D9E75;border-radius:50%;animation:spin .7s linear infinite;margin-right:4px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}

/* 兄弟追加 */
.sibling-add-area{margin-top:10px;}
.add-sibling-btn{width:100%;padding:10px;background:#fff;color:#1D9E75;border:1.5px dashed #1D9E75;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;}
.add-sibling-btn:hover{background:#E1F5EE;}
.add-sibling-btn:disabled{opacity:.4;cursor:not-allowed;}
.sibling-name-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.sibling-name-row input{flex:1;}
.remove-btn{background:none;border:none;color:#888780;font-size:18px;cursor:pointer;padding:0 4px;line-height:1;}
.att-note{font-size:12px;color:#888780;text-align:center;margin-top:8px;}

.future-card{text-align:center;padding:2.5rem 1rem;}
.checklist li{cursor:pointer;}
.checklist li.checked{opacity:0.45;text-decoration:line-through;}
.check-box{width:18px;height:18px;border:1.5px solid #D3D1C7;border-radius:4px;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .15s;background:#fff;}
.check-box.checked{background:#1D9E75;border-color:#1D9E75;}
.check-box.checked::after{content:"";display:block;width:5px;height:9px;border:2px solid #fff;border-top:none;border-left:none;transform:rotate(45deg) translate(-1px,-1px);}
.checklist-reset{font-size:11px;color:#888780;background:none;border:none;cursor:pointer;text-decoration:underline;margin-top:8px;display:block;}
.parent-att-card{background:#f0f8ff;border:1px solid #b5d4f4;border-radius:10px;padding:12px 14px;margin-top:10px;}
.parent-att-title{font-size:12px;font-weight:500;color:#185FA5;margin-bottom:10px;}
.parent-radio-group{display:flex;flex-direction:column;gap:6px;}
.parent-option{display:flex;align-items:center;gap:8px;cursor:pointer;}
.parent-option input[type=radio]{width:16px;height:16px;accent-color:#185FA5;cursor:pointer;}
.parent-option-label{font-size:13px;color:#2c2c2a;}
.parent-fee-note{font-size:12px;color:#185FA5;background:#E6F1FB;border-radius:6px;padding:6px 10px;margin-top:8px;}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.admin-title{font-size:16px;font-weight:500;}
.admin-filter{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;align-items:center;}
.filter-btn{padding:5px 12px;font-size:12px;border:0.5px solid rgba(0,0,0,0.12);border-radius:20px;background:#fff;color:#888780;cursor:pointer;}
.filter-btn.active{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.summary-row{display:flex;gap:10px;margin-bottom:1rem;flex-wrap:wrap;}
.sum-card{flex:1;min-width:70px;background:#f5f5f0;border-radius:8px;padding:10px 12px;text-align:center;}
.sum-num{font-size:22px;font-weight:500;}
.sum-label{font-size:11px;color:#888780;margin-top:2px;}
.admin-table{width:100%;border-collapse:collapse;font-size:13px;}
.admin-table th{text-align:left;padding:8px 10px;font-size:11px;color:#888780;border-bottom:0.5px solid rgba(0,0,0,0.1);font-weight:500;text-transform:uppercase;letter-spacing:.04em;}
.admin-table td{padding:9px 10px;border-bottom:0.5px solid rgba(0,0,0,0.08);}
.admin-table tr:last-child td{border-bottom:none;}
.status-yes{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:#E1F5EE;color:#085041;font-weight:500;}
.status-no{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:#FCEBEB;color:#501313;font-weight:500;}
.status-maybe{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:#FAEEDA;color:#412402;font-weight:500;}
.empty-msg{text-align:center;padding:2rem;font-size:13px;color:#888780;}
.reload-btn{font-size:12px;background:none;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:4px 10px;cursor:pointer;color:#888780;}
</style>
</head>

</div>

async function gasPost(data){
  try{
    var params=new URLSearchParams({action:"post"});
    Object.keys(data).forEach(function(k){params.append(k,String(data[k]));});
    var res=await fetch(GAS_URL+"?"+params.toString());
    return JSON.parse(await res.text());
  }catch(e){return null;}
}
async function gasGet(month){
  try{
    var params=new URLSearchParams({action:"get"});
    if(month)params.append("month",month);
    var res=await fetch(GAS_URL+"?"+params.toString());
    return JSON.parse(await res.text());
  }catch(e){return null;}
}

function initFromStorage(){
  try{
    var savedCls=localStorage.getItem("ksca_cls");
    if(savedCls){
      document.querySelectorAll('input[name="cls"]').forEach(function(r){
        r.checked=(r.value===savedCls);
      });
    }
  }catch(e){}

  if(!ACTS[month]) ACTS[month] = {};

// 支払い金額を計算
function calcPayment(month){
  var act=ACTS[month];
  var clsAct=(act&&act[session.classId])||{};
  var baseFee=clsAct.fee?parseInt(clsAct.fee):0;
  if(!baseFee)return null;

  // 参加する子どもをカウント
  var participatingChildren=children.filter(function(c){
    if(!c.name||!c.type)return false;
    var key=session.classId+"|"+c.name+"|"+month+"|"+c.type;
    var att=attStore[key];
    return att&&att.submitted&&att.answer==="yes";
  });

  if(!participatingChildren.length)return null;

  // 5月は保護者参加割引が設定済みの場合のみ適用（未設定でも表示はする）

  // 兄弟割引：2人以上参加なら全員−500円
  var siblingDiscount=participatingChildren.length>=2?500:0;

  var breakdown=[];
  var total=0;

  // 保護者参加割引を確認
  var pKey="parent_"+session.classId+"_"+session.name+"_"+month;
  var parentAtt=parentStore[pKey];
  var parentDiscount=(month===5&&parentAtt&&parentAtt.submitted&&parentAtt.attend!=="none"&&parentAtt.attend!=="子どものみ参加"&&parentAtt.attend!=="")?1000:0;

  participatingChildren.forEach(function(c){
    var jumpupDiscount=discountMap[c.name]==="jumpup"?500:0;
    // 保護者割引は1人目の子どものみに適用
    var parentD=(participatingChildren.indexOf(c)===0)?parentDiscount:0;
    var discount=siblingDiscount+jumpupDiscount+parentD;
    var amount=Math.max(0,baseFee-discount);
    total+=amount;
    var discNote=[];
    if(siblingDiscount)discNote.push("兄弟割−500円");
    if(jumpupDiscount)discNote.push("教室割−500円");
    if(parentD)discNote.push("保護者参加割−1,000円");
    breakdown.push({
      name:c.name,
      type:c.type,
      base:baseFee,
      discount:discount,
      amount:amount,
      note:discNote.join("・")
    });
  });

  return {breakdown:breakdown,total:total};
}

async function loadUserData(){
  var data=await gasGet();
  if(!data||!Array.isArray(data))return;
  data.forEach(function(r){
    if(r.classId===session.classId){
      if(r.type==="parent"){
        var pKey="parent_"+r.classId+"_"+r.name+"_"+r.month;
        var pAttend=r.answer;
        if(r.answer==="子どものみ参加")pAttend="none";
        else if(r.answer&&r.answer.indexOf("集合から一緒")>=0)pAttend="together";
        else if(r.answer&&r.answer.indexOf("現地集合")>=0)pAttend="local";
        parentStore[pKey]={attend:pAttend,submitted:true};
      } else {
        var key=r.classId+"|"+r.name+"|"+r.month+"|"+r.type;
        attStore[key]={answer:r.answer,reason:r.reason||"",submitted:true,name:r.name,classId:r.classId,month:Number(r.month),type:r.type};
        // 兄弟姉妹を自動復元（同じ苗字かつ名簿に存在する子のみ）
        if(r.name!==session.name){
          var isSibling=getFamilyName(r.name)===getFamilyName(session.name);
          var inRoster=rosterCache.filter(function(rc){return rc.name===r.name;}).length>0;
          var exists=children.filter(function(c){return c.name===r.name;}).length>0;
          if(isSibling&&inRoster&&!exists&&children.length<1+MAX_SIBLINGS){
            children.push({name:r.name,type:r.type});
          }
        }
      }
    }
  });
  // renderContentとupdatePaymentCardはdoLoginのPromise.all完了後に呼ぶ
}

function getItemKey(month){ return "ksca_items_"+session.classId+"_"+month; }
function loadItemChecks(month){
  try{
    var raw=localStorage.getItem(getItemKey(month));
    return raw?JSON.parse(raw):{};
  }catch(e){return {};}
}
function saveItemChecks(month,checks){
  try{localStorage.setItem(getItemKey(month),JSON.stringify(checks));}catch(e){}
}
function toggleItem(month,idx){
  var checks=loadItemChecks(month);
  checks[idx]=!checks[idx];
  saveItemChecks(month,checks);
  applyItemChecks(month);
}
function resetItems(month){
  saveItemChecks(month,{});
  applyItemChecks(month);
}
function applyItemChecks(month){
  var checks=loadItemChecks(month);
  var act=ACTS[month];
  var itemList=(act&&act.items)||BASE_ITEMS;
  itemList.forEach(function(item,idx){
    var li=document.getElementById("item_"+idx);
    var box=document.getElementById("chkbox_"+idx);
    if(!li||!box)return;
    if(checks[idx]){
      li.classList.add("checked");
      box.classList.add("checked");
    } else {
      li.classList.remove("checked");
      box.classList.remove("checked");
    }
  });
}

function onAttChange(idx,val){
  var child=children[idx];
  if(!child||!child.name||!child.type)return;
  var key=attKey(child.name,currentM,child.type);
  if(!attStore[key])attStore[key]={};
  attStore[key].answer=val;attStore[key].submitted=false;
  var sb=document.getElementById("sb_"+idx);if(sb)sb.disabled=false;
  var rb=document.getElementById("rb_"+idx);if(rb)rb.style.display=val!=="yes"?"block":"none";
}

async function submitAtt(idx){
  var child=children[idx];
  if(!child||!child.name||!child.type)return;
  var key=attKey(child.name,currentM,child.type);
  if(!attStore[key]||!attStore[key].answer)return;
  var rt=document.getElementById("rt_"+idx);
  attStore[key].reason=rt?rt.value:"";
  var si=document.getElementById("si_"+idx);
  var sb=document.getElementById("sb_"+idx);
  if(sb)sb.disabled=true;
  if(si)si.innerHTML='<span class="spin"></span>保存中...';
  var result=await gasPost({
    name:child.name,classId:session.classId,classLabel:CLS[session.classId].label,
    type:child.type,month:currentM,
    answer:attStore[key].answer,reason:attStore[key].reason||""
  });
  if(result&&(result.status==="created"||result.status==="updated")){
    attStore[key].submitted=true;
    attStore[key].name=child.name;attStore[key].classId=session.classId;attStore[key].month=currentM;attStore[key].type=child.type;
    renderAttSection();
  } else {
    if(si)si.innerHTML='<span style="color:#A32D2D;">保存に失敗しました。もう一度お試しください。</span>';
    if(sb)sb.disabled=false;
  }
}

function resetAtt(key){if(attStore[key])attStore[key].submitted=false;renderContent();}

  var fee=p.attend==="none"?"6000":"5000";
  var result=await gasPost({
    name:session.name,classId:session.classId,classLabel:CLS[session.classId].label,
    type:"parent",month:5,
    answer:attendLabel,reason:"参加費："+fee+"円"
  });

    renderAttSection();

var adminTab="answered";

function setAdminTab(t){adminTab=t;renderAdmin();}
function renderAdmin(){
  var fDiv=document.getElementById("adminFilter");
  var btns='<span style="font-size:12px;color:#888780;padding:5px 0;">月を選択：</span>';
  MONTHS.forEach(function(mo){btns+='<button class="filter-btn'+(mo.m===adminFilterM?' active':'')+'" onclick="adminFilterM='+mo.m+';renderAdmin()">'+mo.e+mo.l+'</button>';});
  fDiv.innerHTML=btns;

  var entries=adminAllData.filter(function(r){return Number(r.month)===adminFilterM;});
  var yes=entries.filter(function(r){return r.answer==="yes";}).length;
  var no=entries.filter(function(r){return r.answer==="no";}).length;
  var maybe=entries.filter(function(r){return r.answer==="maybe";}).length;

  var unanswered=adminRoster.filter(function(m){
    return !entries.some(function(e){return e.name===m.name&&e.classId===m.classId&&e.type===m.type;});
  });
  var unansweredCount=unanswered.length;

  document.getElementById("adminSummary").innerHTML=
    '<div class="sum-card"><div class="sum-num" style="color:#1D9E75;">'+yes+'</div><div class="sum-label">参加</div></div>'+
    '<div class="sum-card"><div class="sum-num" style="color:#A32D2D;">'+no+'</div><div class="sum-label">欠席</div></div>'+
    '<div class="sum-card"><div class="sum-num" style="color:#BA7517;">'+maybe+'</div><div class="sum-label">検討中</div></div>'+
    '<div class="sum-card"><div class="sum-num" style="color:#993356;">'+unansweredCount+'</div><div class="sum-label">未回答</div></div>'+
    '<div class="sum-card"><div class="sum-num">'+entries.length+'</div><div class="sum-label">回答数</div></div>';

  var existingTab=document.getElementById("adminTabRow");
  if(!existingTab){
    var tabDiv=document.createElement("div");
    tabDiv.id="adminTabRow";
    tabDiv.style.cssText="display:flex;gap:6px;margin-bottom:12px;";
    var tableWrap=document.getElementById("adminTable");
    if(tableWrap)tableWrap.parentNode.parentNode.parentNode.insertBefore(tabDiv,tableWrap.parentNode.parentNode);
  }
  var tabRow=document.getElementById("adminTabRow");
  if(tabRow){
    tabRow.innerHTML="";
    var t1=document.createElement("button");
    t1.className="filter-btn"+(adminTab==="answered"?" active":"");
    t1.textContent="回答一覧（"+entries.length+"）";
    t1.onclick=function(){setAdminTab("answered");};
    tabRow.appendChild(t1);
    var t2=document.createElement("button");
    t2.className="filter-btn"+(adminTab==="unanswered"?" active":"");
    t2.textContent="未回答（"+unansweredCount+"）";
    if(unansweredCount>0){t2.style.color="#A32D2D";t2.style.borderColor="#A32D2D";}
    t2.onclick=function(){setAdminTab("unanswered");};
    tabRow.appendChild(t2);
    var t3=document.createElement("button");
    t3.className="filter-btn"+(adminTab==="maybe"?" active":"");
    t3.textContent="検討中（"+maybe+"）";
    t3.onclick=function(){setAdminTab("maybe");};
    tabRow.appendChild(t3);
  }

  var tableEl=document.getElementById("adminTable");
  var rows="";
  var thead="";

  if(adminTab==="answered"){
    thead='<thead><tr><th>お名前</th><th>クラス</th><th>区分</th><th>回答</th><th>理由</th><th>回答日時</th></tr></thead>';
    if(!entries.length){rows='<tr><td colspan="6" class="empty-msg">まだ回答がありません</td></tr>';}
    else{
      entries.forEach(function(r){
        var ts=r.timestamp?new Date(r.timestamp).toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}):"—";
        var clsLabel=r.classId==="kanayama"?"金山":"大曽根";
        var ans=r.answer==="yes"?'<span class="status-yes">参加</span>':r.answer==="no"?'<span class="status-no">欠席</span>':'<span class="status-maybe">検討中</span>';
        var typ=r.type==="hop"?'<span class="tag tag-hop">HOP</span>':'<span class="tag tag-soar">SOAR</span>';
        rows+='<tr><td>'+r.name+'</td><td style="font-size:12px;">'+clsLabel+'</td><td>'+typ+'</td><td>'+ans+'</td><td style="font-size:12px;color:#888780;">'+(r.reason||"—")+'</td><td style="font-size:11px;color:#888780;white-space:nowrap;">'+ts+'</td></tr>';
      });
    }
  } else if(adminTab==="unanswered"){
    thead='<thead><tr><th>お名前</th><th>クラス</th><th>区分</th><th>状態</th></tr></thead>';
    if(!unanswered.length){rows='<tr><td colspan="4" class="empty-msg">全員回答済みです！</td></tr>';}
    else{
      unanswered.forEach(function(m){
        var clsLabel=m.classId==="kanayama"?"金山":"大曽根";
        var typ=m.type==="hop"?'<span class="tag tag-hop">HOP</span>':'<span class="tag tag-soar">SOAR</span>';
        rows+='<tr><td style="font-weight:500;">'+m.name+'</td><td style="font-size:12px;">'+clsLabel+'</td><td>'+typ+'</td><td><span style="font-size:11px;padding:2px 8px;border-radius:20px;background:#FCEBEB;color:#501313;font-weight:500;">未回答</span></td></tr>';
      });
    }
  } else {
    thead='<thead><tr><th>お名前</th><th>クラス</th><th>区分</th><th>理由</th><th>回答日時</th></tr></thead>';
    var maybeEntries=entries.filter(function(r){return r.answer==="maybe";});
    if(!maybeEntries.length){rows='<tr><td colspan="5" class="empty-msg">検討中の方はいません</td></tr>';}
    else{
      maybeEntries.forEach(function(r){
        var ts=r.timestamp?new Date(r.timestamp).toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}):"—";
        var clsLabel=r.classId==="kanayama"?"金山":"大曽根";
        var typ=r.type==="hop"?'<span class="tag tag-hop">HOP</span>':'<span class="tag tag-soar">SOAR</span>';
        rows+='<tr><td style="font-weight:500;">'+r.name+'</td><td style="font-size:12px;">'+clsLabel+'</td><td>'+typ+'</td><td style="font-size:12px;color:#888780;">'+(r.reason||"—")+'</td><td style="font-size:11px;color:#888780;white-space:nowrap;">'+ts+'</td></tr>';
      });
    }
  }
  if(tableEl)tableEl.innerHTML=thead+'<tbody>'+rows+'</tbody>';
}
