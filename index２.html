<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KSCA 活動案内ポータル</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:#f5f5f0;color:#2c2c2a;min-height:100vh;}
.wrap{max-width:680px;margin:0 auto;padding:1rem 0.75rem 3rem;}
.hidden{display:none!important;}
.login-wrap{display:flex;flex-direction:column;align-items:center;padding-top:2rem;}
.login-card{width:100%;max-width:360px;background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;padding:1.5rem;}
.logo-mark{text-align:center;margin-bottom:1.25rem;}
.logo-mark .lt{font-size:26px;font-weight:500;color:#1D9E75;letter-spacing:1px;}
.logo-mark p{font-size:12px;color:#888780;margin-top:2px;}
.field-wrap{margin-bottom:12px;}
.f-label{font-size:12px;color:#888780;margin-bottom:6px;display:block;}
input[type=text],input[type=password]{width:100%;padding:9px 10px;font-size:14px;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;background:#fff;color:#2c2c2a;outline:none;}
input:focus{border-color:#1D9E75;}
.cls-row{display:flex;gap:8px;margin-bottom:12px;}
.cls-option{flex:1;}
.cls-option input[type=radio]{position:absolute;opacity:0;width:0;height:0;}
.cls-label{display:block;text-align:center;padding:10px 0;font-size:13px;font-weight:500;border:2px solid #D3D1C7;border-radius:8px;background:#F1EFE8;color:#5F5E5A;cursor:pointer;transition:all .15s;user-select:none;}
.cls-option input[type=radio]:checked+.cls-label{border-color:#1D9E75!important;background:#1D9E75!important;color:#fff!important;}
.login-btn{width:100%;padding:11px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:4px;}
.login-btn:hover{background:#0F6E56;}
.login-err{font-size:12px;color:#A32D2D;margin-top:8px;text-align:center;}
.admin-link{text-align:center;margin-top:14px;font-size:12px;color:#888780;cursor:pointer;text-decoration:underline;}
.top-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.site-name{font-size:16px;font-weight:500;}
.user-sub{font-size:12px;color:#888780;}
.logout-btn{font-size:12px;background:none;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:4px 10px;cursor:pointer;color:#888780;}
.tab-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;margin-bottom:1.25rem;}
.tab-row{display:flex;gap:4px;min-width:max-content;padding-bottom:2px;}
.tab-btn{padding:6px 12px;font-size:13px;border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;background:#fff;color:#888780;cursor:pointer;white-space:nowrap;}
.tab-btn.active{background:#1D9E75;color:#fff;border-color:#1D9E75;font-weight:500;}
.card{background:#fff;border:0.5px solid rgba(0,0,0,0.12);border-radius:12px;overflow:hidden;margin-bottom:12px;}
.step-header{display:flex;align-items:center;gap:10px;padding:12px 16px;border-bottom:0.5px solid rgba(0,0,0,0.08);}
.step-num{width:22px;height:22px;border-radius:50%;background:#E1F5EE;color:#0F6E56;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:500;flex-shrink:0;}
.step-title{font-size:14px;font-weight:500;}
.step-body{padding:14px 16px;}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.i-label{font-size:11px;color:#888780;margin-bottom:2px;text-transform:uppercase;letter-spacing:.04em;}
.i-val{font-size:14px;font-weight:500;}
.i-val.sm{font-size:13px;font-weight:400;line-height:1.5;}
.tag{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;font-weight:500;margin-right:4px;margin-bottom:4px;}
.tag-hop{background:#E1F5EE;color:#085041;}
.tag-soar{background:#E6F1FB;color:#0C447C;}
.tag-only{background:#FAEEDA;color:#412402;}
.checklist{list-style:none;}
.checklist li{display:flex;align-items:flex-start;gap:8px;font-size:13px;padding:5px 0;border-bottom:0.5px solid rgba(0,0,0,0.08);}
.checklist li:last-child{border-bottom:none;}
.chk{color:#1D9E75;font-size:14px;flex-shrink:0;}
.flow-steps{display:flex;flex-direction:column;}
.flow-item{display:flex;gap:12px;padding:6px 0;}
.fl{display:flex;flex-direction:column;align-items:center;width:28px;flex-shrink:0;}
.fd{width:9px;height:9px;border-radius:50%;background:#1D9E75;margin-top:4px;}
.fli{width:1px;flex:1;background:rgba(0,0,0,0.1);min-height:14px;}
.flow-item:last-child .fli{display:none;}
.ftime{font-size:12px;color:#888780;font-weight:500;min-width:44px;margin-top:2px;}
.fdesc{font-size:13px;line-height:1.5;margin-top:2px;}

/* 出欠ブロック */
.child-att-block{border:0.5px solid rgba(0,0,0,0.12);border-radius:8px;overflow:hidden;margin-bottom:10px;}
.child-att-block:last-child{margin-bottom:0;}
.child-att-header{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#f9f9f7;cursor:pointer;user-select:none;}
.child-att-header-left{display:flex;align-items:center;gap:8px;}
.child-badge{font-size:12px;font-weight:500;padding:3px 10px;border-radius:20px;}
.badge-hop{background:#E1F5EE;color:#085041;}
.badge-soar{background:#E6F1FB;color:#0C447C;}
.badge-none{background:#F1EFE8;color:#5F5E5A;}
.child-att-name{font-size:13px;font-weight:500;}
.child-att-status{font-size:12px;color:#888780;}
.chevron{font-size:12px;color:#888780;transition:transform .2s;}
.chevron.open{transform:rotate(180deg);}
.child-att-body{padding:12px;border-top:0.5px solid rgba(0,0,0,0.08);}

/* クラス選択（HOP/SOAR）*/
.type-row{display:flex;gap:6px;margin-bottom:10px;}
.type-option{flex:1;}
.type-option input[type=radio]{position:absolute;opacity:0;width:0;height:0;}
.type-label{display:block;text-align:center;padding:8px 0;font-size:12px;font-weight:500;border:2px solid #D3D1C7;border-radius:8px;background:#F1EFE8;color:#5F5E5A;cursor:pointer;user-select:none;transition:all .15s;}
.type-option input[type=radio]:checked+.type-label.hop-type{background:#1D9E75!important;border-color:#1D9E75!important;color:#fff!important;}
.type-option input[type=radio]:checked+.type-label.soar-type{background:#185FA5!important;border-color:#185FA5!important;color:#fff!important;}

/* 出欠ラジオ */
.att-radio-group{display:flex;gap:6px;}
.att-option{flex:1;}
.att-option input[type=radio]{position:absolute;opacity:0;width:0;height:0;}
.att-option-label{display:block;text-align:center;padding:10px 0;font-size:13px;font-weight:500;border:2px solid #D3D1C7;border-radius:8px;background:#F1EFE8;color:#5F5E5A;cursor:pointer;user-select:none;transition:all .15s;}
.att-option input[type=radio]:checked+.att-option-label.yes-label{background:#1D9E75!important;border-color:#1D9E75!important;color:#fff!important;}
.att-option input[type=radio]:checked+.att-option-label.no-label{background:#E24B4A!important;border-color:#E24B4A!important;color:#fff!important;}
.att-option input[type=radio]:checked+.att-option-label.maybe-label{background:#BA7517!important;border-color:#BA7517!important;color:#fff!important;}
.reason-box{margin-top:8px;}
.reason-box textarea{width:100%;padding:7px 9px;font-size:12px;min-height:56px;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;background:#fff;color:#2c2c2a;resize:vertical;font-family:inherit;}
.sub-btn{width:100%;padding:10px;background:#1D9E75;color:#fff;border:none;border-radius:8px;font-size:14px;font-weight:500;cursor:pointer;margin-top:10px;}
.sub-btn:hover{background:#0F6E56;}
.sub-btn:disabled{opacity:.4;cursor:not-allowed;}
.done-msg{background:#E1F5EE;border-radius:8px;padding:10px 12px;font-size:13px;color:#0F6E56;}
.done-row{display:flex;align-items:center;justify-content:space-between;gap:8px;}
.change-link{font-size:12px;background:none;border:none;color:#888780;cursor:pointer;text-decoration:underline;white-space:nowrap;}
.saving-indicator{font-size:12px;color:#888780;text-align:center;margin-top:6px;min-height:18px;}
.spin{display:inline-block;width:10px;height:10px;border:1.5px solid #D3D1C7;border-top-color:#1D9E75;border-radius:50%;animation:spin .7s linear infinite;margin-right:4px;vertical-align:middle;}
@keyframes spin{to{transform:rotate(360deg);}}

/* 兄弟追加 */
.sibling-add-area{margin-top:10px;}
.add-sibling-btn{width:100%;padding:10px;background:#fff;color:#1D9E75;border:1.5px dashed #1D9E75;border-radius:8px;font-size:13px;font-weight:500;cursor:pointer;}
.add-sibling-btn:hover{background:#E1F5EE;}
.add-sibling-btn:disabled{opacity:.4;cursor:not-allowed;}
.sibling-name-row{display:flex;gap:8px;align-items:center;margin-bottom:8px;}
.sibling-name-row input{flex:1;}
.remove-btn{background:none;border:none;color:#888780;font-size:18px;cursor:pointer;padding:0 4px;line-height:1;}
.att-note{font-size:12px;color:#888780;text-align:center;margin-top:8px;}

.future-card{text-align:center;padding:2.5rem 1rem;}
.admin-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:1.25rem;}
.admin-title{font-size:16px;font-weight:500;}
.admin-filter{display:flex;gap:6px;margin-bottom:1rem;flex-wrap:wrap;align-items:center;}
.filter-btn{padding:5px 12px;font-size:12px;border:0.5px solid rgba(0,0,0,0.12);border-radius:20px;background:#fff;color:#888780;cursor:pointer;}
.filter-btn.active{background:#1D9E75;color:#fff;border-color:#1D9E75;}
.summary-row{display:flex;gap:10px;margin-bottom:1rem;flex-wrap:wrap;}
.sum-card{flex:1;min-width:70px;background:#f5f5f0;border-radius:8px;padding:10px 12px;text-align:center;}
.sum-num{font-size:22px;font-weight:500;}
.sum-label{font-size:11px;color:#888780;margin-top:2px;}
.admin-table{width:100%;border-collapse:collapse;font-size:13px;}
.admin-table th{text-align:left;padding:8px 10px;font-size:11px;color:#888780;border-bottom:0.5px solid rgba(0,0,0,0.1);font-weight:500;text-transform:uppercase;letter-spacing:.04em;}
.admin-table td{padding:9px 10px;border-bottom:0.5px solid rgba(0,0,0,0.08);}
.admin-table tr:last-child td{border-bottom:none;}
.status-yes{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:#E1F5EE;color:#085041;font-weight:500;}
.status-no{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:#FCEBEB;color:#501313;font-weight:500;}
.status-maybe{display:inline-block;font-size:11px;padding:2px 8px;border-radius:20px;background:#FAEEDA;color:#412402;font-weight:500;}
.empty-msg{text-align:center;padding:2rem;font-size:13px;color:#888780;}
.reload-btn{font-size:12px;background:none;border:0.5px solid rgba(0,0,0,0.15);border-radius:8px;padding:4px 10px;cursor:pointer;color:#888780;}
</style>
</head>
<body>
<div class="wrap">

<div id="loginWrap" class="login-wrap">
  <div class="login-card">
    <div class="logo-mark">
      <div class="lt">KSCA</div>
      <p>保護者専用 活動案内ポータル</p>
    </div>
    <div class="field-wrap">
      <span class="f-label">参加クラスを選択してください</span>
      <div class="cls-row">
        <label class="cls-option">
          <input type="radio" name="cls" value="kanayama" checked>
          <span class="cls-label">金山クラス（日）</span>
        </label>
        <label class="cls-option">
          <input type="radio" name="cls" value="ozone">
          <span class="cls-label">大曽根クラス（土）</span>
        </label>
      </div>
    </div>
    <div class="field-wrap">
      <span class="f-label">お子様のお名前（1人目）</span>
      <input type="text" id="nameInput" placeholder="例：田中 太郎">
    </div>
    <div class="field-wrap">
      <span class="f-label">パスワード</span>
      <input type="password" id="pwInput" placeholder="スタッフからお知らせしたパスワード">
    </div>
    <button class="login-btn" onclick="doLogin()">ログイン</button>
    <div class="login-err hidden" id="loginErr">パスワードが正しくありません</div>
    <div class="admin-link" onclick="showAdminLogin()">管理者ログイン</div>
  </div>
</div>

<div id="adminLoginWrap" class="login-wrap hidden">
  <div class="login-card">
    <div class="logo-mark">
      <div class="lt">KSCA</div>
      <p>管理者ログイン</p>
    </div>
    <div class="field-wrap">
      <span class="f-label">管理者パスワード</span>
      <input type="password" id="adminPwInput" placeholder="管理者パスワード">
    </div>
    <button class="login-btn" onclick="doAdminLogin()">ログイン</button>
    <div class="login-err hidden" id="adminLoginErr">パスワードが正しくありません</div>
    <div class="admin-link" onclick="showUserLogin()">保護者ログインに戻る</div>
  </div>
</div>

<div id="portalWrap" class="hidden">
  <div class="top-bar">
    <div>
      <div class="site-name">KSCA 活動案内</div>
      <div class="user-sub" id="userLabel"></div>
    </div>
    <button class="logout-btn" onclick="doLogout()">ログアウト</button>
  </div>
  <div class="tab-scroll"><div class="tab-row" id="tabRow"></div></div>
  <div id="content"></div>
</div>

<div id="adminWrap" class="hidden">
  <div class="admin-header">
    <div class="admin-title">出欠管理画面</div>
    <div style="display:flex;gap:8px;">
      <button class="reload-btn" onclick="loadAdminData()">再読み込み</button>
      <button class="logout-btn" onclick="doLogout()">ログアウト</button>
    </div>
  </div>
  <div class="admin-filter" id="adminFilter"></div>
  <div class="summary-row" id="adminSummary"></div>
  <div class="card"><div style="overflow-x:auto;">
    <table class="admin-table">
      <thead><tr><th>お名前</th><th>クラス</th><th>区分</th><th>回答</th><th>理由</th><th>回答日時</th></tr></thead>
      <tbody id="adminBody"></tbody>
    </table>
  </div></div>
  <div class="saving-indicator" id="adminStatus"></div>
</div>

</div>
<script>
var GAS_URL="https://script.google.com/macros/s/AKfycbzr7XAnUG-AOwiAl85sfOMB_SB_IiG4lILo3SrqLUDQInqiBhQkR0r1f9K59OowN7Oj/exec";
var PW={kanayama:"ksca2026",ozone:"ozone2026",admin:"ksca_admin"};
var CLS={
  kanayama:{label:"金山クラス（日）",spot:"JR金山駅 大型ビジョン前",time:"08:45",end:"16:00",hasSoar:true},
  ozone:{label:"大曽根クラス（土）",spot:"JR大曽根駅 改札前",time:"08:45",end:"16:00",hasSoar:false}
};
var MONTHS=[{m:4,e:"🌸",l:"4月"},{m:5,e:"🍜",l:"5月"},{m:6,e:"🍳",l:"6月"},{m:7,e:"🚌",l:"7月"},{m:9,e:"💧",l:"9月"},{m:10,e:"🍂",l:"10月"},{m:11,e:"🔥",l:"11月"},{m:12,e:"🚋",l:"12月"},{m:1,e:"⛺",l:"1月"},{m:2,e:"🎯",l:"2月"},{m:3,e:"🌕",l:"3月"}];
var BASE_ITEMS=["動きやすい服装","タオル・着替え","水筒（500ml以上）","昼食・おやつ","レインウェア","帽子・日焼け止め"];
var ACTS={
  4:{hop:"「宝探し」— 公園内に隠されたポイントをグループで探しておいしいお宝を見つけよう！",soar:"「タープ張りにチャレンジ」— 自分たちの力でタープを張る。グループの団結力が成功のカギ！",flow:[{t:"08:45",d:"集合・出発"},{t:"09:30",d:"フィールド到着・グループ別活動開始"},{t:"12:00",d:"昼食"},{t:"13:00",d:"午後の活動"},{t:"15:30",d:"振り返り・片付け"},{t:"16:00",d:"解散"}]},
  5:{hop:"「流しそうめん」（親子イベント）— 水遊びも楽しみながら親子で過ごします。",soar:"「流しそうめん」（親子イベント）— 毎年恒例！親子で参加できます。",flow:[{t:"08:45",d:"集合・出発"},{t:"09:30",d:"フィールド到着・準備"},{t:"10:30",d:"流しそうめん・水遊び"},{t:"12:30",d:"昼食"},{t:"14:00",d:"自由活動・片付け"},{t:"16:00",d:"解散"}]},
  6:{hop:"「簡単おかずづくり」— カセットコンロで調理。野菜を洗う・切る・焼くをグループで分担！",soar:"「2人組炊飯チャレンジ」— 上級生と下級生のペアで飯盒炊飯。ホップのご飯も用意する責任感ある活動。",flow:[{t:"08:45",d:"集合・出発"},{t:"09:30",d:"フィールド到着・食材準備"},{t:"10:30",d:"クッキング開始"},{t:"12:00",d:"みんなで食べよう！"},{t:"13:30",d:"片付け・振り返り"},{t:"16:00",d:"解散"}]}
};
var DATES={4:"2026年4月19日",5:"2026年5月17日",6:"2026年6月21日"};
var MAX_SIBLINGS=3;

var session={mode:"",classId:"",name:""};
// children: [{name, type(hop/soar)}]  type='' if ozone(hopのみ)
var children=[];
var currentM=4;
var attStore={};
var openBlocks={};
var adminAllData=[];
var adminFilterM=4;

async function gasPost(data){
  try{
    var params=new URLSearchParams({action:"post"});
    Object.keys(data).forEach(function(k){params.append(k,String(data[k]));});
    var res=await fetch(GAS_URL+"?"+params.toString());
    return JSON.parse(await res.text());
  }catch(e){return null;}
}
async function gasGet(month){
  try{
    var params=new URLSearchParams({action:"get"});
    if(month)params.append("month",month);
    var res=await fetch(GAS_URL+"?"+params.toString());
    return JSON.parse(await res.text());
  }catch(e){return null;}
}

function getSelClass(){
  var r=document.querySelector('input[name="cls"]:checked');
  return r?r.value:"kanayama";
}
function showAdminLogin(){document.getElementById("loginWrap").classList.add("hidden");document.getElementById("adminLoginWrap").classList.remove("hidden");}
function showUserLogin(){document.getElementById("adminLoginWrap").classList.add("hidden");document.getElementById("loginWrap").classList.remove("hidden");}

function doLogin(){
  var name=document.getElementById("nameInput").value.trim();
  var pw=document.getElementById("pwInput").value;
  var cls=getSelClass();
  if(!name){document.getElementById("nameInput").focus();return;}
  if(pw!==PW[cls]){document.getElementById("loginErr").classList.remove("hidden");return;}
  document.getElementById("loginErr").classList.add("hidden");
  session={mode:"user",classId:cls,name:name};
  // 1人目の子どもを設定（大曽根はhop固定）
  children=[{name:name,type:CLS[cls].hasSoar?"":"hop"}];
  document.getElementById("loginWrap").classList.add("hidden");
  document.getElementById("portalWrap").classList.remove("hidden");
  document.getElementById("userLabel").textContent=CLS[cls].label+"　"+name+" さん";
  currentM=4;
  renderTabs();renderContent();
  loadUserData();
}
function doAdminLogin(){
  var pw=document.getElementById("adminPwInput").value;
  if(pw!==PW.admin){document.getElementById("adminLoginErr").classList.remove("hidden");return;}
  document.getElementById("adminLoginErr").classList.add("hidden");
  session={mode:"admin"};
  document.getElementById("adminLoginWrap").classList.add("hidden");
  document.getElementById("adminWrap").classList.remove("hidden");
  adminFilterM=4;loadAdminData();
}
function doLogout(){
  session={mode:"",classId:"",name:""};
  document.getElementById("pwInput").value="";
  document.getElementById("adminPwInput").value="";
  attStore={};children=[];openBlocks={};
  ["portalWrap","adminWrap"].forEach(function(id){document.getElementById(id).classList.add("hidden");});
  document.getElementById("loginWrap").classList.remove("hidden");
}

async function loadUserData(){
  var data=await gasGet();
  if(!data||!Array.isArray(data))return;
  data.forEach(function(r){
    // 同じクラスのデータを全員分読み込む
    if(r.classId===session.classId){
      var key=r.classId+"|"+r.name+"|"+r.month+"|"+r.type;
      attStore[key]={answer:r.answer,reason:r.reason||"",submitted:true,name:r.name,classId:r.classId,month:Number(r.month),type:r.type};
      // 兄弟姉妹を自動復元（1人目以外）
      if(r.name!==session.name){
        var exists=children.filter(function(c){return c.name===r.name;}).length>0;
        if(!exists&&children.length<1+MAX_SIBLINGS){
          children.push({name:r.name,type:r.type});
        }
      }
    }
  });
  renderContent();
}

function attKey(name,month,type){return session.classId+"|"+name+"|"+month+"|"+type;}

function toggleBlock(idx){
  openBlocks[idx]=!openBlocks[idx];
  renderAttSection();
}

function addSibling(){
  if(children.length>=1+MAX_SIBLINGS)return;
  children.push({name:"",type:CLS[session.classId].hasSoar?"":"hop"});
  openBlocks[children.length-1]=true;
  renderAttSection();
}

function removeSibling(idx){
  children.splice(idx,1);
  var newOpen={};
  Object.keys(openBlocks).forEach(function(k){
    var ki=parseInt(k);
    if(ki<idx)newOpen[ki]=openBlocks[ki];
    else if(ki>idx)newOpen[ki-1]=openBlocks[ki];
  });
  openBlocks=newOpen;
  renderAttSection();
}

function updateChildName(idx,val){children[idx].name=val;}
function updateChildType(idx,val){children[idx].type=val;renderAttSection();}

function renderTabs(){
  var row=document.getElementById("tabRow");row.innerHTML="";
  MONTHS.forEach(function(mo){
    var btn=document.createElement("button");
    btn.className="tab-btn"+(mo.m===currentM?" active":"");
    btn.textContent=mo.e+" "+mo.l;
    btn.onclick=(function(m){return function(){currentM=m;renderTabs();renderContent();};})(mo.m);
    row.appendChild(btn);
  });
}

function renderContent(){
  var act=ACTS[currentM];
  var cls=CLS[session.classId];
  if(!act){
    var mo=MONTHS.filter(function(x){return x.m===currentM;})[0];
    document.getElementById("content").innerHTML='<div class="card"><div class="future-card"><div style="font-size:30px;margin-bottom:8px;">'+mo.e+'</div><div style="font-size:15px;font-weight:500;margin-bottom:6px;">'+mo.l+'の活動情報</div><div style="font-size:13px;color:#888780;">活動の2週間前にLINEでお知らせ後、こちらも更新されます。</div></div></div>';
    return;
  }
  var dateStr=DATES[currentM]||"—";
  var html="";

  html+='<div class="card"><div class="step-header"><div class="step-num">1</div><div class="step-title">基本情報</div></div><div class="step-body"><div class="info-grid">';
  html+='<div><div class="i-label">開催日</div><div class="i-val sm">'+dateStr+'（'+(cls.hasSoar?"日":"土")+'）</div></div>';
  html+='<div><div class="i-label">集合時間</div><div class="i-val">'+cls.time+'</div></div>';
  html+='<div style="grid-column:1/-1"><div class="i-label">集合・解散場所</div><div class="i-val sm">'+cls.spot+'</div></div>';
  html+='<div><div class="i-label">解散時間</div><div class="i-val">'+cls.end+'</div></div>';
  html+='<div><div class="i-label">参加費</div><div class="i-val sm">7,000円（兄弟割・教室割あり）</div></div>';
  html+='<div style="grid-column:1/-1"><div class="i-label">交通費</div><div class="i-val sm">電車でフィールドへ移動（往復実費）</div></div>';
  html+='</div></div></div>';

  html+='<div class="card"><div class="step-header"><div class="step-num">2</div><div class="step-title">活動内容</div></div><div class="step-body">';
  html+='<div style="margin-bottom:'+(cls.hasSoar?'14px':'0')+'"><span class="tag tag-hop">HOP（幼〜低学年）</span>'+(cls.hasSoar?'':'<span class="tag tag-only">HOPのみ開催</span>');
  html+='<div style="font-size:13px;line-height:1.6;margin-top:6px;">'+act.hop+'</div></div>';
  if(cls.hasSoar){html+='<div><span class="tag tag-soar">SOAR（中〜高学年）</span><div style="font-size:13px;line-height:1.6;margin-top:6px;">'+act.soar+'</div></div>';}
  html+='</div></div>';

  html+='<div class="card"><div class="step-header"><div class="step-num">3</div><div class="step-title">持ち物</div></div><div class="step-body"><ul class="checklist">';
  BASE_ITEMS.forEach(function(i){html+='<li><span class="chk">✓</span>'+i+'</li>';});
  html+='</ul></div></div>';

  html+='<div class="card"><div class="step-header"><div class="step-num">4</div><div class="step-title">1日の流れ</div></div><div class="step-body"><div class="flow-steps">';
  act.flow.forEach(function(f){html+='<div class="flow-item"><div class="fl"><div class="fd"></div><div class="fli"></div></div><div class="ftime">'+f.t+'</div><div class="fdesc">'+f.d+'</div></div>';});
  html+='</div></div></div>';

  html+='<div class="card"><div class="step-header"><div class="step-num">5</div><div class="step-title">出欠の回答</div></div><div class="step-body"><div id="attSection"></div><div class="att-note">回答後もこのページから変更できます</div></div></div>';
  document.getElementById("content").innerHTML=html;
  renderAttSection();
}

function renderAttSection(){
  var sec=document.getElementById("attSection");
  if(!sec)return;
  var cls=CLS[session.classId];
  var html="";

  children.forEach(function(child,idx){
    var isFirst=(idx===0);
    var type=child.type;
    var name=child.name;
    var key=name?attKey(name,currentM,type):"";
    var att=(key&&attStore[key])||{};
    var isOpen=openBlocks[idx]!==false; // デフォルトopen
    if(openBlocks[idx]===undefined)openBlocks[idx]=true;

    // バッジ
    var badgeHtml='';
    if(type==="hop")badgeHtml='<span class="child-badge badge-hop">HOP</span>';
    else if(type==="soar")badgeHtml='<span class="child-badge badge-soar">SOAR</span>';
    else badgeHtml='<span class="child-badge badge-none">未選択</span>';

    // ステータス表示
    var statusTxt="";
    if(att.submitted){statusTxt=att.answer==="yes"?"✓ 参加":att.answer==="no"?"✗ 欠席":"△ 検討中";}

    html+='<div class="child-att-block">';
    html+='<div class="child-att-header" onclick="toggleBlock('+idx+')">';
    html+='<div class="child-att-header-left">'+badgeHtml;
    if(name){html+='<span class="child-att-name">'+name+'</span>';}
    else{html+='<span class="child-att-name" style="color:#888780;">お名前を入力してください</span>';}
    if(statusTxt){html+='<span class="child-att-status">'+statusTxt+'</span>';}
    html+='</div>';
    html+='<span class="chevron'+(isOpen?' open':'')+'">▼</span>';
    html+='</div>';

    if(isOpen){
      html+='<div class="child-att-body">';

      // 兄弟の場合は名前入力欄
      if(!isFirst){
        html+='<div class="sibling-name-row">';
        html+='<input type="text" placeholder="お名前" value="'+name+'" oninput="updateChildName('+idx+',this.value)">';
        html+='<button class="remove-btn" onclick="removeSibling('+idx+')">×</button>';
        html+='</div>';
      }

      // HOP/SOAR選択（金山クラスのみ）
      if(cls.hasSoar){
        html+='<div style="font-size:11px;color:#888780;margin-bottom:4px;text-transform:uppercase;letter-spacing:.04em;">クラス</div>';
        html+='<div class="type-row">';
        html+='<label class="type-option"><input type="radio" name="type_'+idx+'" value="hop" '+(type==="hop"?"checked":"")+'  onchange="updateChildType('+idx+',\'hop\')"><span class="type-label hop-type">HOP（幼〜低学年）</span></label>';
        html+='<label class="type-option"><input type="radio" name="type_'+idx+'" value="soar" '+(type==="soar"?"checked":"")+' onchange="updateChildType('+idx+',\'soar\')"><span class="type-label soar-type">SOAR（中〜高学年）</span></label>';
        html+='</div>';
      }

      // 出欠回答
      if(att.submitted){
        var ansLabel=att.answer==="yes"?"✓ 参加":att.answer==="no"?"✗ 欠席":"△ 検討中";
        html+='<div class="done-msg"><div class="done-row"><span>'+ansLabel+' として回答済み</span><button class="change-link" onclick="resetAtt(\''+key+'\')">変更する</button></div>';
        if(att.reason){html+='<div style="font-size:12px;margin-top:4px;opacity:.8;">'+att.reason+'</div>';}
        html+='</div>';
      } else {
        var cY=att.answer==="yes"?"checked":"";
        var cN=att.answer==="no"?"checked":"";
        var cM=att.answer==="maybe"?"checked":"";
        var showR=(att.answer&&att.answer!=="yes")?"block":"none";
        var canSubmit=(name&&type&&att.answer)?true:false;
        html+='<div style="margin-top:8px;"><div style="font-size:11px;color:#888780;margin-bottom:6px;text-transform:uppercase;letter-spacing:.04em;">出欠</div>';
        html+='<div class="att-radio-group">';
        html+='<label class="att-option"><input type="radio" name="ans_'+idx+'" value="yes" '+cY+' onchange="onAttChange(\''+idx+'\',\'yes\')"><span class="att-option-label yes-label">✓ 参加</span></label>';
        html+='<label class="att-option"><input type="radio" name="ans_'+idx+'" value="no" '+cN+' onchange="onAttChange(\''+idx+'\',\'no\')"><span class="att-option-label no-label">✗ 欠席</span></label>';
        html+='<label class="att-option"><input type="radio" name="ans_'+idx+'" value="maybe" '+cM+' onchange="onAttChange(\''+idx+'\',\'maybe\')"><span class="att-option-label maybe-label">△ 検討中</span></label>';
        html+='</div>';
        html+='<div class="reason-box" id="rb_'+idx+'" style="display:'+showR+';"><textarea id="rt_'+idx+'" placeholder="欠席・検討中の理由（任意）">'+(att.reason||"")+'</textarea></div></div>';
        html+='<button class="sub-btn" id="sb_'+idx+'" onclick="submitAtt('+idx+')" '+(canSubmit?"":"disabled")+'>回答を送信する</button>';
        html+='<div class="saving-indicator" id="si_'+idx+'"></div>';
      }
      html+='</div>'; // child-att-body
    }
    html+='</div>'; // child-att-block
  });

  // 兄弟追加ボタン
  html+='<div class="sibling-add-area">';
  var canAdd=children.length<1+MAX_SIBLINGS;
  html+='<button class="add-sibling-btn" onclick="addSibling()" '+(canAdd?"":"disabled")+'>＋ 兄弟姉妹を追加する</button>';
  if(!canAdd){html+='<div style="font-size:12px;color:#888780;text-align:center;margin-top:6px;">最大3名まで追加できます</div>';}
  html+='</div>';

  sec.innerHTML=html;
}

function onAttChange(idx,val){
  var child=children[idx];
  if(!child||!child.name||!child.type)return;
  var key=attKey(child.name,currentM,child.type);
  if(!attStore[key])attStore[key]={};
  attStore[key].answer=val;attStore[key].submitted=false;
  var sb=document.getElementById("sb_"+idx);if(sb)sb.disabled=false;
  var rb=document.getElementById("rb_"+idx);if(rb)rb.style.display=val!=="yes"?"block":"none";
}

async function submitAtt(idx){
  var child=children[idx];
  if(!child||!child.name||!child.type)return;
  var key=attKey(child.name,currentM,child.type);
  if(!attStore[key]||!attStore[key].answer)return;
  var rt=document.getElementById("rt_"+idx);
  attStore[key].reason=rt?rt.value:"";
  var si=document.getElementById("si_"+idx);
  var sb=document.getElementById("sb_"+idx);
  if(sb)sb.disabled=true;
  if(si)si.innerHTML='<span class="spin"></span>保存中...';
  var result=await gasPost({
    name:child.name,classId:session.classId,classLabel:CLS[session.classId].label,
    type:child.type,month:currentM,
    answer:attStore[key].answer,reason:attStore[key].reason||""
  });
  if(result&&(result.status==="created"||result.status==="updated")){
    attStore[key].submitted=true;
    attStore[key].name=child.name;attStore[key].classId=session.classId;attStore[key].month=currentM;attStore[key].type=child.type;
    renderAttSection();
  } else {
    if(si)si.innerHTML='<span style="color:#A32D2D;">保存に失敗しました。もう一度お試しください。</span>';
    if(sb)sb.disabled=false;
  }
}

function resetAtt(key){if(attStore[key])attStore[key].submitted=false;renderAttSection();}

async function loadAdminData(){
  var st=document.getElementById("adminStatus");
  if(st)st.innerHTML='<span class="spin"></span>読み込み中...';
  var data=await gasGet();
  if(!data||!Array.isArray(data)){if(st)st.innerHTML='<span style="color:#A32D2D;">読み込みに失敗しました</span>';return;}
  adminAllData=data;if(st)st.innerHTML="";renderAdmin();
}
function renderAdmin(){
  var fDiv=document.getElementById("adminFilter");
  var btns='<span style="font-size:12px;color:#888780;padding:5px 0;">月を選択：</span>';
  MONTHS.forEach(function(mo){btns+='<button class="filter-btn'+(mo.m===adminFilterM?' active':'')+'" onclick="adminFilterM='+mo.m+';renderAdmin()">'+mo.e+mo.l+'</button>';});
  fDiv.innerHTML=btns;
  var entries=adminAllData.filter(function(r){return Number(r.month)===adminFilterM;});
  var yes=entries.filter(function(r){return r.answer==="yes";}).length;
  var no=entries.filter(function(r){return r.answer==="no";}).length;
  var maybe=entries.filter(function(r){return r.answer==="maybe";}).length;
  document.getElementById("adminSummary").innerHTML=
    '<div class="sum-card"><div class="sum-num" style="color:#1D9E75;">'+yes+'</div><div class="sum-label">参加</div></div>'+
    '<div class="sum-card"><div class="sum-num" style="color:#A32D2D;">'+no+'</div><div class="sum-label">欠席</div></div>'+
    '<div class="sum-card"><div class="sum-num" style="color:#BA7517;">'+maybe+'</div><div class="sum-label">検討中</div></div>'+
    '<div class="sum-card"><div class="sum-num">'+entries.length+'</div><div class="sum-label">回答数</div></div>';
  var tbody=document.getElementById("adminBody");
  if(!entries.length){tbody.innerHTML='<tr><td colspan="6" class="empty-msg">まだ回答がありません</td></tr>';return;}
  var rows="";
  entries.forEach(function(r){
    var ts=r.timestamp?new Date(r.timestamp).toLocaleString("ja-JP",{month:"numeric",day:"numeric",hour:"2-digit",minute:"2-digit"}):"—";
    rows+='<tr><td>'+r.name+'</td><td style="font-size:12px;">'+(r.classLabel||r.classId)+'</td><td>'+(r.type==="hop"?'<span class="tag tag-hop">HOP</span>':'<span class="tag tag-soar">SOAR</span>')+'</td><td>'+(r.answer==="yes"?'<span class="status-yes">参加</span>':r.answer==="no"?'<span class="status-no">欠席</span>':'<span class="status-maybe">検討中</span>')+'</td><td style="font-size:12px;color:#888780;">'+(r.reason||"—")+'</td><td style="font-size:11px;color:#888780;white-space:nowrap;">'+ts+'</td></tr>';
  });
  tbody.innerHTML=rows;
}
</script>
</body>
</html>
